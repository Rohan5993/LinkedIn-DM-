# Blueprint for https://render.com — connect this repo, then "Apply" or create a Web Service from this file.
# Set GEMINI_API_KEY and APIFY_API_TOKEN (and optional Supabase vars) in the Render dashboard.
services:
  - type: web
    name: linkedin-dm
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: APIFY_LINKEDIN_ACTOR
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
